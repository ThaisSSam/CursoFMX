services:
  postgres:
    image: postgres:16-alpine
    container_name: treinamento-postgres
    environment:
      POSTGRES_USER: treinamento
      POSTGRES_PASSWORD: treinamento
      POSTGRES_DB: treinamento
    ports:
      - "5433:5432"
    volumes:
      - treinamento_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treinamento -d treinamento"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  treinamento_pgdata:
